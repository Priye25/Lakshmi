<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Lakshmi ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      overflow:hidden;
      font-family:'Poppins', sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
    }

    /* Romantic Blurred Background */
    .bg {
      position:fixed;
      width:100%;
      height:100%;
      background:
        linear-gradient(rgba(255, 105, 180, 0.3), rgba(255, 182, 193, 0.3)),
        url('Lakshmi.jpg');
      background-size:cover;
      background-position:center;
      filter:blur(14px) brightness(0.6);
      z-index:0;
    }

    .container {
      position:relative;
      z-index:2;
      padding:30px;
      border-radius:20px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.12);
      box-shadow:0 0 40px rgba(255,105,180,0.3);
    }

    img {
      width:260px;
      border-radius:15px;
      margin-bottom:15px;
      box-shadow:0 0 25px rgba(255,182,193,0.6);
    }

    h1 {
      font-family:'Great Vibes', cursive;
      font-size:3.2rem;
      text-shadow:0 0 15px rgba(255,105,180,0.8);
    }

    .message {
      margin-top:15px;
      font-size:1.9rem;
      color:#ffe4ec;
    }

  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="container">
    <img src="Lakshmi.jpg" alt="Lakshmi">
    <h1>Lakshmi</h1>
   <div class="message">
  I won’t lie…<br>
  you were the most captivating person in the party yesterday night ✨<br><br>

  There was something about you…<br>
  the way you smiled, the way you carried yourself —<br>
  it just stayed with me.<br><br>

  You didn’t just look beautiful…<br>
  you felt unforgettable ✨
</div>

  <!-- Romantic Music -->
  <audio id="bgMusic" loop>
    <source src="romantic_guitar.mp3" type="audio/mpeg">
  </audio>

  <!-- Music Button -->
  <button onclick="toggleMusic()" style="position:fixed; bottom:20px; right:20px; padding:10px 15px; border:none; border-radius:20px; background:#ff6b81; color:white; cursor:pointer; box-shadow:0 0 10px rgba(0,0,0,0.3);">
    🎵 Play Music
  </button>

  <script>
    const music = document.getElementById('bgMusic');
    let isPlaying = false;

    function toggleMusic() {
      if (!isPlaying) {
        music.play();
        isPlaying = true;
      } else {
        music.pause();
        isPlaying = false;
      }
    }
  </script>

</body>
</html>
