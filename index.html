<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Lakshmi ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height:100vh;
      font-family:'Poppins', sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
      padding:20px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
    }

    .bg {
      position:fixed;
      width:100%;
      height:100%;
      background:
        linear-gradient(rgba(255, 105, 180, 0.3), rgba(255, 182, 193, 0.3)),
        url('Lakshmi.jpg');
      background-size:cover;
      background-position:center;
      filter:blur(12px) brightness(0.6);
      z-index:0;
    }

    .container {
      position:relative;
      z-index:2;
      padding:20px;
      border-radius:20px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.15);
      box-shadow:0 0 30px rgba(255,105,180,0.3);
      max-width:400px;
      width:100%;
    }

    img {
      width:100%;
      max-width:240px;
      border-radius:15px;
      margin-bottom:15px;
      box-shadow:0 0 20px rgba(255,182,193,0.6);
    }

    h1 {
      font-family:'Great Vibes', cursive;
      font-size:2.5rem;
      text-shadow:0 0 10px rgba(255,105,180,0.8);
    }

    .message {
      margin-top:15px;
      font-size:1.1rem;
      line-height:1.6;
      color:#ffe4ec;
    }

    button {
      position:fixed;
      bottom:15px;
      right:15px;
      padding:10px 14px;
      font-size:0.9rem;
      border:none;
      border-radius:20px;
      background:#ff6b81;
      color:white;
      cursor:pointer;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    /* 📱 Mobile specific tweaks */
    @media (max-width: 480px) {
      h1 {
        font-size:2.2rem;
      }

      .message {
        font-size:1rem;
      }

      img {
        max-width:200px;
      }
    }

  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="container">
    <img src="Lakshmi.jpg" alt="Lakshmi">
    <h1>Lakshmi ❤️</h1>

    <div class="message">
      I won’t lie…<br>
      you were the most captivating person in the party yesterday night ✨<br><br>

      There was something about you…<br>
      the way you smiled, the way you carried yourself —<br>
      it just stayed with me.<br><br>

      You didn’t just look beautiful…<br>
      you felt unforgettable ✨
    </div>
  </div>

  <!-- Music -->
  <audio id="bgMusic" loop>
    <source src="romantic_guitar.mp3" type="audio/mpeg">
  </audio>

  <button onclick="toggleMusic()">🎵 Music</button>

  <script>
    const music = document.getElementById('bgMusic');
    let isPlaying = false;

    function toggleMusic() {
      if (!isPlaying) {
        music.play();
        isPlaying = true;
      } else {
        music.pause();
        isPlaying = false;
      }
    }
  </script>

</body>
</html>
